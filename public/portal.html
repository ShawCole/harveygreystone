<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Document Upload — HGC & ARK Capital Consulting</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy:#1e3a5f; --navy-dark:#152d4a; --navy-light:#2a4d7a;
      --gold:#d4a853;
      --bg:#f8fafc; --card:#ffffff; --text:#1e293b; --muted:#64748b;
      --success:#22c55e; --warning:#f59e0b; --danger:#ef4444;
      --border:#e2e8f0; --input-bg:#f8fafc;
      --radius-md:8px; --radius-lg:12px;
      --shadow:0 4px 6px -1px rgba(0,0,0,0.07);
    }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem; line-height:1.6; }
    .wrap { max-width:760px; margin:0 auto; }
    .card { background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; margin-bottom:1.5rem; }
    .hdr { background:linear-gradient(135deg,var(--navy),var(--navy-dark)); color:#fff; padding:2rem; }
    .hdr h1 { font-size:22px; font-weight:700; letter-spacing:-0.01em; }
    .hdr p { opacity:.8; font-size:13px; margin-top:.3rem; font-weight:400; }
    .body { padding:2rem; }
    .step { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.7px; margin-bottom:.5rem; }
    h2 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:1rem; }
    .ncnda { max-height:320px; overflow-y:auto; border:1px solid var(--navy-light); border-radius:var(--radius-lg); padding:1.25rem; background:var(--input-bg); font-size:13px; white-space:pre-wrap; margin-bottom:1rem; color:var(--text); }
    .ncnda::-webkit-scrollbar { width:6px; } .ncnda::-webkit-scrollbar-track { background:transparent; } .ncnda::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    .signed-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(34,197,94,.1); color:#15803d; border:1px solid rgba(34,197,94,.3); padding:6px 12px; border-radius:var(--radius-md); font-size:12px; font-weight:600; margin-bottom:1rem; }
    label { display:block; font-weight:600; font-size:13px; margin-bottom:.4rem; color:var(--text); }
    input[type="text"],input[type="email"] { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:14px; font-family:inherit; margin-bottom:1rem; background:var(--card); color:var(--text); transition:border-color .15s; }
    input[type="text"]:focus,input[type="email"]:focus { outline:none; border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,58,95,.1); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .chk { display:flex; gap:10px; align-items:flex-start; margin-bottom:1.25rem; }
    .chk input { width:16px; height:16px; margin-top:3px; accent-color:var(--navy); flex-shrink:0; }
    .chk label { font-weight:400; color:var(--muted); font-size:13px; }
    .btn { padding:12px 24px; border:none; border-radius:var(--radius-md); font-weight:600; cursor:pointer; font-size:14px; width:100%; font-family:inherit; transition:background .15s, opacity .15s; }
    .btn-primary { background:var(--navy); color:#fff; } .btn-primary:hover { background:var(--navy-light); } .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-accent { background:var(--gold); color:#fff; }
    .drop { border:2px dashed var(--border); border-radius:var(--radius-lg); padding:2.5rem; text-align:center; background:var(--input-bg); cursor:pointer; transition:border-color .15s, background .15s; }
    .drop:hover { border-color:var(--navy); background:#f0f4f8; }
    .drop .ico { font-size:36px; } .drop .t { font-weight:600; margin:.5rem 0 .25rem; color:var(--text); } .drop .s { font-size:13px; color:var(--muted); }
    .file { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:var(--input-bg); border-radius:var(--radius-md); font-size:13px; margin-top:8px; border:1px solid var(--border); }
    .muted { color:var(--muted); font-size:12px; }
    .hide { display:none; }
    .err { color:var(--danger); font-size:13px; margin-top:.5rem; }
    .cert { background:rgba(34,197,94,.06); border:1px solid rgba(34,197,94,.25); border-radius:var(--radius-lg); padding:1rem; font-size:12px; margin-top:1rem; color:var(--text); }
    .foot { text-align:center; color:var(--muted); font-size:12px; margin-top:.5rem; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <h1 id="title">HGC &amp; ARK Capital Consulting</h1>
      <p id="subtitle">Secure document portal</p>
    </div>
    <div class="body" id="content"><p class="muted">Loading…</p></div>
  </div>
  <div class="foot">🔒 Confidential. Access is governed by the NCNDA. Powered by HGC &amp; ARK Capital Consulting.</div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('t');
  const C = document.getElementById('content');
  let state = null;

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  async function load(){
    if(!token){ C.innerHTML='<p class="err">Missing access link. Please use the link provided to you.</p>'; return; }
    try{
      const r = await fetch('/api/portal?token='+encodeURIComponent(token));
      if(!r.ok){ const e=await r.json().catch(()=>({})); C.innerHTML='<p class="err">'+esc(e.error||'This link is invalid or has expired.')+'</p>'; return; }
      state = await r.json();
      document.getElementById('title').textContent = state.company ? `${state.company}` : 'HGC & ARK Capital Consulting';
      document.getElementById('subtitle').textContent = 'Secure document portal · ' + (state.dealName||'');
      render();
    }catch(e){ C.innerHTML='<p class="err">Could not load the portal. Please try again.</p>'; }
  }

  function render(){
    if(state.clientSigned || state.clientSigner) return renderUpload();
    renderSign();
  }

  function renderSign(){
    const internal = (state.internalSigners||[]);
    const internalLine = internal.length
      ? `<div class="signed-badge">✓ Signed by HGC &amp; ARK: ${internal.map(s=>esc(s.name)).join(', ')}</div>`
      : `<div class="muted" style="margin-bottom:1rem;">Awaiting countersignature — sign below to proceed.</div>`;
    C.innerHTML = `
      <div class="step">Step 1 of 2 · Sign the agreement</div>
      <h2>${esc(state.agreementTitle)}</h2>
      ${internalLine}
      <div class="ncnda">${esc(state.agreementText)}</div>
      <div class="row">
        <div><label>Full name *</label><input id="sg-name" placeholder="Your full name"></div>
        <div><label>Title</label><input id="sg-title" placeholder="e.g. CEO"></div>
      </div>
      <label>Email *</label><input id="sg-email" type="email" placeholder="you@company.com">
      <label>Type your name to sign *</label><input id="sg-sign" placeholder="Type your full legal name">
      <div class="chk"><input type="checkbox" id="sg-agree"><label for="sg-agree">I have read and agree to be bound by this Non-Circumvention &amp; Non-Disclosure Agreement, and I am authorized to sign on behalf of my organization.</label></div>
      <button class="btn btn-primary" id="sg-btn" onclick="sign()">Sign &amp; Continue</button>
      <div class="err hide" id="sg-err"></div>`;
  }

  async function sign(){
    const name=document.getElementById('sg-name').value.trim();
    const title=document.getElementById('sg-title').value.trim();
    const email=document.getElementById('sg-email').value.trim();
    const typed=document.getElementById('sg-sign').value.trim();
    const agree=document.getElementById('sg-agree').checked;
    const err=document.getElementById('sg-err');
    err.classList.add('hide');
    if(!name||!email||!typed||!agree){ err.textContent='Please complete all required fields and accept the agreement.'; err.classList.remove('hide'); return; }
    if(typed.toLowerCase()!==name.toLowerCase()){ err.textContent='Your typed signature must match your full name.'; err.classList.remove('hide'); return; }
    const btn=document.getElementById('sg-btn'); btn.disabled=true; btn.textContent='Signing…';
    try{
      const r=await fetch('/api/portal-sign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,name,title,email,agree:true})});
      const d=await r.json();
      if(!r.ok) throw new Error(d.error||'Could not record signature');
      await load();
    }catch(e){ err.textContent=e.message; err.classList.remove('hide'); btn.disabled=false; btn.textContent='Sign & Continue'; }
  }

  function renderUpload(){
    const cs = state.clientSigner;
    const certLine = state.certificateId
      ? `<div class="cert">✓ Agreement finalized. Verifiable certificate: <strong>${esc(state.certificateId)}</strong> · <a href="/api/certificate?cert=${encodeURIComponent(state.certificateId)}" target="_blank">verify</a></div>`
      : '';
    const uploads = (state.uploads||[]).map(u=>`<div class="file"><span>📄 ${esc(u.filename)}</span><span class="muted">${new Date(u.uploadedAt).toLocaleString()}</span></div>`).join('') || '<p class="muted">No documents uploaded yet.</p>';
    C.innerHTML = `
      <div class="step">Step 2 of 2 · Upload documents</div>
      <div class="signed-badge">✓ NCNDA signed${cs?` by ${esc(cs.name)}`:''} on ${cs?new Date(cs.signedAt).toLocaleDateString():''}</div>
      <h2>Upload your documents</h2>
      <p class="muted" style="margin-bottom:1rem;">Drop files below or click to browse. Your uploads are encrypted and visible only to the HGC &amp; ARK team.</p>
      <div class="drop" id="drop"><div class="ico">📥</div><div class="t">Drop files here to upload</div><div class="s">PDF, Excel, Word, images — any deal document</div>
        <input type="file" id="fileInput" multiple class="hide"></div>
      <div id="up-progress" style="font-size:13px;font-weight:600;color:var(--navy);margin-top:.75rem;"></div>
      <div id="up-success" class="hide" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#065f46;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-top:.75rem;"></div>
      <div id="uploadList" style="margin-top:1rem;">${uploads}</div>
      ${certLine}
      <div class="err hide" id="up-err"></div>`;
    const drop=document.getElementById('drop'), fi=document.getElementById('fileInput');
    drop.onclick=()=>fi.click();
    drop.ondragover=e=>{e.preventDefault(); drop.style.borderColor='#1e3a5f';};
    drop.ondragleave=e=>{e.preventDefault(); drop.style.borderColor='';};
    drop.ondrop=e=>{e.preventDefault(); drop.style.borderColor=''; handle(e.dataTransfer.files);};
    fi.onchange=()=>handle(fi.files);
  }

  const ALLOWED_TYPES = ['.pdf','.doc','.docx','.xls','.xlsx','.ppt','.pptx','.jpg','.jpeg','.png','.txt','.csv'];
  async function handle(files){
    const err=document.getElementById('up-err'); err.classList.add('hide');
    const total = files.length;
    let current = 0;
    for(const f of files){
      const ext = (f.name.includes('.') ? '.' + f.name.split('.').pop() : '').toLowerCase();
      if(!ALLOWED_TYPES.includes(ext)){ err.textContent='"'+f.name+'": File type not allowed. Accepted: '+ALLOWED_TYPES.join(', '); err.classList.remove('hide'); continue; }
      current++;
      const prog=document.getElementById('up-progress'); if(prog) prog.textContent='Uploading file '+current+' of '+total+'…';
      try{
        const r=await fetch('/api/portal-upload-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,filename:f.name,contentType:f.type||'application/octet-stream'})});
        const d=await r.json();
        if(!r.ok) throw new Error(d.error||'Upload not permitted');
        const put=await fetch(d.url,{method:'PUT',headers:{'Content-Type':f.type||'application/octet-stream'},body:f});
        if(!put.ok) throw new Error('Upload failed');
        await fetch('/api/portal-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,path:d.path,filename:f.name,size:f.size})});
        const suc=document.getElementById('up-success'); if(suc){ suc.textContent='✓ Uploaded: '+f.name; suc.classList.remove('hide'); }
      }catch(e){ err.textContent='”'+f.name+'”: '+e.message; err.classList.remove('hide'); }
    }
    const prog=document.getElementById('up-progress'); if(prog) prog.textContent='';
    await load();
  }

  load();
</script>
</body>
</html>

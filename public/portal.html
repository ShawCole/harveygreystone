<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Document Upload — Harvey Greystone</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy:#0f2b45; --navy-dark:#0f2b45; --navy-light:#1c3a57; --charcoal:#1c3a57;
      --gold:#5aa9e0; --gold-light:#a9d2ef; --gold-muted:rgba(90,169,224,0.15);
      --gray-50:#f4f9fd; --gray-100:#e8f3fc; --gray-200:#d8e7f3; --gray-300:#c8dff2;
      --gray-400:#8fa9c0; --gray-500:#69829a; --gray-600:#5e7f9b; --gray-700:#1c3a57;
      --gray-800:#16324a; --gray-900:#0f2b45;
      --success:#188a4e; --success-light:rgba(24,138,78,0.12);
      --warning:#b17d12; --warning-light:rgba(177,125,18,0.12);
      --danger:#c34a45; --danger-light:rgba(195,74,69,0.12);
      --info:#5aa9e0; --info-light:rgba(90,169,224,0.12);
      --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
      --serif:Georgia,'Times New Roman',serif;
      --bg:#e8f3fc; --card:#ffffff; --text:#1e293b; --muted:#69829a;
      --border:#d8e7f3; --input-bg:#f4f9fd;
      --shadow:0 4px 6px -1px rgba(15,43,69,0.08);
    }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem 1rem; line-height:1.6; }
    .wrap { max-width:760px; margin:0 auto; }
    .card { background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; margin-bottom:1.5rem; }
    .hdr { background:var(--gray-100); border-bottom:1px solid var(--gray-200); padding:2rem; }
    .hdr h1 { font-size:22px; font-weight:700; color:var(--navy); }
    .hdr p { color:var(--muted); font-size:13px; margin-top:.3rem; font-weight:400; }
    .portal-brand { font-family:var(--serif); letter-spacing:.14em; text-transform:uppercase; font-weight:700; color:var(--navy); }
    .body { padding:2rem; }
    .step { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.7px; margin-bottom:.5rem; }
    h2 { font-size:18px; font-weight:700; color:var(--text); margin-bottom:1rem; }
    .ncnda { max-height:320px; overflow-y:auto; border:1px solid var(--gray-300); border-radius:var(--radius-lg); padding:1.25rem; background:var(--input-bg); font-size:13px; white-space:pre-wrap; margin-bottom:1rem; color:var(--text); }
    .ncnda::-webkit-scrollbar { width:6px; } .ncnda::-webkit-scrollbar-track { background:transparent; } .ncnda::-webkit-scrollbar-thumb { background:var(--gray-300); border-radius:3px; }
    .signed-badge { display:inline-flex; align-items:center; gap:6px; background:var(--success-light); color:#15803d; border:1px solid rgba(24,138,78,.3); padding:6px 12px; border-radius:var(--radius-md); font-size:12px; font-weight:600; margin-bottom:1rem; }
    label { display:block; font-weight:600; font-size:13px; margin-bottom:.4rem; color:var(--text); }
    input[type="text"],input[type="email"] { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:var(--radius-md); font-size:14px; font-family:inherit; margin-bottom:1rem; background:var(--card); color:var(--text); transition:border-color .15s; }
    input[type="text"]:focus,input[type="email"]:focus { outline:none; border-color:var(--navy); box-shadow:0 0 0 3px rgba(15,43,69,.1); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .chk { display:flex; gap:10px; align-items:flex-start; margin-bottom:1.25rem; }
    .chk input { width:16px; height:16px; margin-top:3px; accent-color:var(--navy); flex-shrink:0; }
    .chk label { font-weight:400; color:var(--muted); font-size:13px; }
    .btn { padding:12px 24px; border:none; border-radius:var(--radius-md); font-weight:600; cursor:pointer; font-size:14px; width:100%; font-family:inherit; transition:background .15s, opacity .15s; }
    .btn-primary { background:var(--navy); color:#fff; } .btn-primary:hover { background:var(--navy-light); } .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-accent { background:var(--gold); color:#fff; }
    .drop { border:2px dashed var(--border); border-radius:var(--radius-lg); padding:2.5rem; text-align:center; background:var(--input-bg); cursor:pointer; transition:border-color .15s, background .15s; }
    .drop:hover { border-color:var(--navy); background:var(--gray-100); }
    .drop .ico { font-size:36px; } .drop .t { font-weight:600; margin:.5rem 0 .25rem; color:var(--text); } .drop .s { font-size:13px; color:var(--muted); }
    .file { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:var(--input-bg); border-radius:var(--radius-md); font-size:13px; margin-top:8px; border:1px solid var(--border); }
    .muted { color:var(--muted); font-size:12px; }
    .hide { display:none; }
    .err { color:var(--danger); font-size:13px; margin-top:.5rem; }
    .cert { background:var(--success-light); border:1px solid rgba(24,138,78,.25); border-radius:var(--radius-lg); padding:1rem; font-size:12px; margin-top:1rem; color:var(--text); }
    .foot { text-align:center; color:var(--muted); font-size:12px; margin-top:.5rem; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="hdr">
      <h1 id="portalBrand" class="portal-brand">HARVEY GREYSTONE</h1>
      <p id="subtitle">Secure document portal</p>
    </div>
    <div class="body" id="content"><p class="muted">Loading…</p></div>
  </div>
  <div class="foot">🔒 Confidential. Access is governed by the NCNDA. Powered by <span id="portalBrandFoot">Harvey Greystone</span>.</div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('t');
  const C = document.getElementById('content');
  let state = null;
  let fundingChecklists = null;

  const BRAND_NAMES = { harveygreystone: 'HARVEY GREYSTONE', capitalstreams: 'CAPITAL STREAMS' };
  function brandDisplay(){ return (BRAND_NAMES[state && state.brand] || BRAND_NAMES.harveygreystone).split(' ').map(w=>w[0]+w.slice(1).toLowerCase()).join(' '); }

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  async function load(){
    if(!token){ C.innerHTML='<p class="err">Missing access link. Please use the link provided to you.</p>'; return; }
    try{
      const [portalRes, checklistRes] = await Promise.all([
        fetch('/api/portal?token='+encodeURIComponent(token)),
        fundingChecklists ? Promise.resolve(null) : fetch('/funding-checklists.json').then(r=>r.json()).catch(()=>null)
      ]);
      if(checklistRes) fundingChecklists = checklistRes;
      if(!portalRes.ok){ const e=await portalRes.json().catch(()=>({})); C.innerHTML='<p class="err">'+esc(e.error||'This link is invalid or has expired.')+'</p>'; return; }
      state = await portalRes.json();
      const bEl = document.getElementById('portalBrand');
      if (bEl) bEl.textContent = BRAND_NAMES[state.brand] || BRAND_NAMES.harveygreystone;
      const bFoot = document.getElementById('portalBrandFoot');
      if (bFoot) bFoot.textContent = brandDisplay();
      document.title = `${brandDisplay()} — Client Portal`;
      document.getElementById('subtitle').textContent = (state.company ? state.company + ' · ' : '') + 'Secure document portal · ' + (state.dealName||'');
      render();
    }catch(e){ C.innerHTML='<p class="err">Could not load the portal. Please try again.</p>'; }
  }

  function render(){
    if(state.clientSigned || state.clientSigner) return renderUpload();
    renderSign();
  }

  function renderSign(){
    const internal = (state.internalSigners||[]);
    const internalLine = internal.length
      ? `<div class="signed-badge">✓ Signed by ${esc(brandDisplay())}: ${internal.map(s=>esc(s.name)).join(', ')}</div>`
      : `<div class="muted" style="margin-bottom:1rem;">Awaiting countersignature — sign below to proceed.</div>`;
    C.innerHTML = `
      <div class="step">Step 1 of 2 · Sign the agreement</div>
      <h2>${esc(state.agreementTitle)}</h2>
      ${internalLine}
      <div class="ncnda">${esc(state.agreementText)}</div>
      <div class="row">
        <div><label>Full name *</label><input id="sg-name" placeholder="Your full name"></div>
        <div><label>Title</label><input id="sg-title" placeholder="e.g. CEO"></div>
      </div>
      <label>Email *</label><input id="sg-email" type="email" placeholder="you@company.com">
      <label>Type your name to sign *</label><input id="sg-sign" placeholder="Type your full legal name">
      <div class="chk"><input type="checkbox" id="sg-agree"><label for="sg-agree">I have read and agree to be bound by this Non-Circumvention &amp; Non-Disclosure Agreement, and I am authorized to sign on behalf of my organization.</label></div>
      <button class="btn btn-primary" id="sg-btn" onclick="sign()">Sign &amp; Continue</button>
      <div class="err hide" id="sg-err"></div>`;
  }

  async function sign(){
    const name=document.getElementById('sg-name').value.trim();
    const title=document.getElementById('sg-title').value.trim();
    const email=document.getElementById('sg-email').value.trim();
    const typed=document.getElementById('sg-sign').value.trim();
    const agree=document.getElementById('sg-agree').checked;
    const err=document.getElementById('sg-err');
    err.classList.add('hide');
    if(!name||!email||!typed||!agree){ err.textContent='Please complete all required fields and accept the agreement.'; err.classList.remove('hide'); return; }
    if(typed.toLowerCase()!==name.toLowerCase()){ err.textContent='Your typed signature must match your full name.'; err.classList.remove('hide'); return; }
    const btn=document.getElementById('sg-btn'); btn.disabled=true; btn.textContent='Signing…';
    try{
      const r=await fetch('/api/portal-sign',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,name,title,email,agree:true})});
      const d=await r.json();
      if(!r.ok) throw new Error(d.error||'Could not record signature');
      await load();
    }catch(e){ err.textContent=e.message; err.classList.remove('hide'); btn.disabled=false; btn.textContent='Sign & Continue'; }
  }

  function renderUpload(){
    const cs = state.clientSigner;
    const certLine = state.certificateId
      ? `<div class="cert">✓ Agreement finalized. Verifiable certificate: <strong>${esc(state.certificateId)}</strong> · <a href="/api/certificate?cert=${encodeURIComponent(state.certificateId)}" target="_blank">verify</a></div>`
      : '';
    const uploads = (state.uploads||[]).map(u=>`<div class="file"><span>${esc(u.filename)}</span><span class="muted">${new Date(u.uploadedAt).toLocaleString()}</span></div>`).join('') || '';

    // Determine if we have a funding-type checklist
    const ft = state.fundingType && fundingChecklists
      ? fundingChecklists.types.find(t => t.id === state.fundingType) : null;
    const intake = state.clientIntake || {};

    let checklistHtml = '';
    if (ft) {
      const docs = ft.documents;
      const received = docs.filter(doc => intake[doc.id] && intake[doc.id].status === 'received').length;
      const total = docs.length;
      checklistHtml = `
        <h2>Documents needed for your ${esc(ft.name)}</h2>
        <p class="muted" style="margin-bottom:.75rem;">${received} of ${total} documents submitted. Your uploads are encrypted and visible only to the ${esc(brandDisplay())} team.</p>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.5rem;">
          <div style="height:100%;width:${total?Math.round(received/total*100):0}%;background:${received===total?'var(--success)':'var(--gold)'};border-radius:4px;transition:width .3s;"></div>
        </div>
      `;
      docs.forEach(doc => {
        const entry = intake[doc.id];
        const isReceived = entry && entry.status === 'received';
        const statusBadge = isReceived
          ? `<span class="signed-badge" style="margin:0;padding:4px 10px;font-size:11px;">Received</span>`
          : `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(100,116,139,.1);color:var(--muted);padding:4px 10px;border-radius:var(--radius-md);font-size:11px;font-weight:600;">Missing</span>`;
        const uploadId = 'intake-file-' + doc.id;
        const uploadBtn = isReceived ? '' : `<button class="btn btn-primary" style="padding:6px 14px;font-size:12px;" onclick="document.getElementById('${uploadId}').click()">Upload</button><input type="file" id="${uploadId}" class="hide" onchange="handleIntake('${doc.id}', this.files)">`;
        const receivedInfo = isReceived && entry.file ? `<span class="muted" style="font-size:11px;">${esc(entry.file.filename)} - ${new Date(entry.file.uploadedAt).toLocaleDateString()}</span>` : '';
        checklistHtml += `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="flex:1;">
              <div style="font-weight:600;font-size:13px;">${esc(doc.name)}${doc.required ? '<span style="color:var(--danger);margin-left:2px;">*</span>' : ''}</div>
              ${doc.note ? '<div class="muted" style="font-size:11px;margin-top:2px;">'+esc(doc.note)+'</div>' : ''}
              ${receivedInfo}
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
              ${statusBadge}
              ${uploadBtn}
            </div>
          </div>
        `;
      });
      checklistHtml += '<div style="margin-top:1.5rem;"><h2 style="font-size:15px;">Other Documents</h2><p class="muted" style="margin-bottom:.75rem;font-size:12px;">Upload any additional documents not listed above.</p></div>';
    } else {
      checklistHtml = `
        <h2>Upload your documents</h2>
        <p class="muted" style="margin-bottom:1rem;">Drop files below or click to browse. Your uploads are encrypted and visible only to the ${esc(brandDisplay())} team.</p>
      `;
    }

    C.innerHTML = `
      <div class="step">Step 2 of 2 · Upload documents</div>
      <div class="signed-badge">✓ NCNDA signed${cs?` by ${esc(cs.name)}`:''} on ${cs?new Date(cs.signedAt).toLocaleDateString():''}</div>
      ${checklistHtml}
      <div class="drop" id="drop"><div class="t">Drop files here to upload</div><div class="s">PDF, Excel, Word, images — any deal document</div>
        <input type="file" id="fileInput" multiple class="hide"></div>
      <div id="up-progress" style="font-size:13px;font-weight:600;color:var(--navy);margin-top:.75rem;"></div>
      <div id="up-success" class="hide" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#065f46;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-top:.75rem;"></div>
      <div id="uploadList" style="margin-top:1rem;">${uploads}</div>
      ${certLine}
      <div class="err hide" id="up-err"></div>`;
    const drop=document.getElementById('drop'), fi=document.getElementById('fileInput');
    drop.onclick=()=>fi.click();
    drop.ondragover=e=>{e.preventDefault(); drop.style.borderColor='var(--navy)';};
    drop.ondragleave=e=>{e.preventDefault(); drop.style.borderColor='';};
    drop.ondrop=e=>{e.preventDefault(); drop.style.borderColor=''; handle(e.dataTransfer.files);};
    fi.onchange=()=>handle(fi.files);
  }

  const ALLOWED_TYPES = ['.pdf','.doc','.docx','.xls','.xlsx','.ppt','.pptx','.jpg','.jpeg','.png','.txt','.csv'];
  async function handle(files, docId){
    const err=document.getElementById('up-err'); err.classList.add('hide');
    const total = files.length;
    let current = 0;
    for(const f of files){
      const ext = (f.name.includes('.') ? '.' + f.name.split('.').pop() : '').toLowerCase();
      if(!ALLOWED_TYPES.includes(ext)){ err.textContent='”'+f.name+'”: File type not allowed. Accepted: '+ALLOWED_TYPES.join(', '); err.classList.remove('hide'); continue; }
      current++;
      const prog=document.getElementById('up-progress'); if(prog) prog.textContent='Uploading file '+current+' of '+total+'…';
      try{
        const body = {token,filename:f.name,contentType:f.type||'application/octet-stream'};
        if(docId) body.docId = docId;
        const r=await fetch('/api/portal-upload-url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await r.json();
        if(!r.ok) throw new Error(d.error||'Upload not permitted');
        const put=await fetch(d.url,{method:'PUT',headers:{'Content-Type':f.type||'application/octet-stream'},body:f});
        if(!put.ok) throw new Error('Upload failed');
        const recBody = {token,path:d.path,filename:f.name,size:f.size};
        if(docId) recBody.docId = docId;
        await fetch('/api/portal-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(recBody)});
        const suc=document.getElementById('up-success'); if(suc){ suc.textContent='Uploaded: '+f.name; suc.classList.remove('hide'); }
      }catch(e){ err.textContent='”'+f.name+'”: '+e.message; err.classList.remove('hide'); }
    }
    const prog=document.getElementById('up-progress'); if(prog) prog.textContent='';
    await load();
  }

  function handleIntake(docId, files){
    if(!files || !files.length) return;
    handle(files, docId);
  }

  load();
</script>
</body>
</html>

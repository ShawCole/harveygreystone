[build]
  publish = "."
  functions = "netlify/functions"

# Serve every /api/* path from the matching function file.
# /api/deals -> functions/deals.js, /api/login -> functions/login.js, etc.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"
